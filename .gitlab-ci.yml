stages:
  - parse
  - build
  - release

# ==========================================
# 1. PARSE VERSION STAGE
# ==========================================
parse-version:
  stage: parse
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - apt-get update && apt-get install -y grep
    - |
      if [ -f details.xml ]; then
        VERSION=$(grep -oP '<version>\K[^<]+' details.xml | head -1)
        APP_NAME=$(grep -oP '<app>\K[^<]+' details.xml | head -1)
        echo "VERSION=$VERSION" >> variables.env
        echo "APP_NAME=$APP_NAME" >> variables.env
        echo "✅ Version extracted: $VERSION"
        echo "✅ App name extracted: $APP_NAME"
      else
        echo "❌ details.xml not found"
        exit 1
      fi
  artifacts:
    reports:
      dotenv: variables.env

# ==========================================
# 2. BUILD STAGE (LINUX & WINDOWS)
# ==========================================

# Compilación en Linux
build-linux:
  stage: build
  image: python:3.11
  needs:
    - job: parse-version
      artifacts: true
  variables:
    OS_NAME: "linux"
  script:
    - python -m pip install --upgrade pip
    - pip install PyQt6 pyinstaller leviathan-ui
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - python -m packagemaker compile --project . --output ./dist --format iflapp || true
    - |
      if [ ! -f dist/${APP_NAME}.iflapp ]; then
        mkdir -p dist
        python -c "
import zipfile
from pathlib import Path
output_dir = Path('dist')
iflapp_path = output_dir / '${APP_NAME}.iflapp'
with zipfile.ZipFile(iflapp_path, 'w', zipfile.ZIP_DEFLATED) as zf:
    for file in Path('.').rglob('*'):
        if file.is_file() and not str(file).startswith('.git') and 'dist' not in file.parts:
            zf.write(file, file.relative_to(Path('.')))
print('✅ IFLAPP Linux Fallback creado')
        "
      fi
  artifacts:
    paths:
      - dist/${APP_NAME}.iflapp

# Compilación en Windows
build-windows:
  stage: build
  tags:
    - shared-windows
    - windows-1809
  needs:
    - job: parse-version
      artifacts: true
  variables:
    OS_NAME: "windows"
  before_script:
    - set SHELL=cmd.exe
  script:
    - python -m pip install --upgrade pip
    - pip install PyQt6 pyinstaller leviathan-ui
    - if exist requirements.txt pip install -r requirements.txt
    - python -m packagemaker compile --project . --output ./dist --format iflapp || rem
    - if not exist dist mkdir dist
    - python -c "import zipfile; from pathlib import Path; output_dir = Path('dist'); iflapp_path = output_dir / '%APP_NAME%.iflapp'; zf = zipfile.ZipFile(iflapp_path, 'w', zipfile.ZIP_DEFLATED); [zf.write(f, f.relative_to(Path('.'))) for f in Path('.').rglob('*') if f.is_file() and not str(f).startswith('.git') and 'dist' not in f.parts]; zf.close(); print('✅ IFLAPP Windows Fallback creado')"
  artifacts:
    paths:
      - dist/%APP_NAME%.iflapp

# ==========================================
# 3. RELEASE STAGE
# ==========================================
release-app:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: parse-version
      artifacts: true
    - job: build-linux
      artifacts: true
    - job: build-windows
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - |
      if [ -f RELEASE_NOTES.md ]; then
        RELEASE_DESCRIPTION=$(cat RELEASE_NOTES.md)
      else
        RELEASE_DESCRIPTION="Release notes not found"
      fi
      echo "Preparando lanzamiento de la versión $VERSION..."
  release:
    name: 'Release $VERSION'
    tag_name: 'v$VERSION'
    description: 'Lanzamiento automatizado de $APP_NAME desde la pipeline de GitLab.'
    assets:
      links:
        - name: 'IFLAPP Linux Package'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/dist/${APP_NAME}.iflapp?job=build-linux'
        - name: 'IFLAPP Windows Package'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/dist/${APP_NAME}.iflapp?job=build-windows'
