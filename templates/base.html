<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Package Maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mica-bg: rgba(25, 25, 25, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #0078d4;
            --accent-hover: #005a9e;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-light: rgba(255, 255, 255, 0.1);
            --liquid-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI Variable', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 120, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 87, 34, 0.1) 0%, transparent 40%);
        }

        .mica-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--mica-bg);
            backdrop-filter: blur(50px) saturate(150%);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 10%;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            color: white;
        }

        .logo svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .glass-card {
            background: var(--liquid-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
        }

        footer {
            padding: 4rem 10% 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-light);
            margin-top: 4rem;
        }

        .prose {
            max-width: 800px;
            margin: 0 auto;
        }

        .prose h1, .prose h2, .prose h3 { margin-top: 2rem; margin-bottom: 1rem; color: white; border-bottom: 1px solid var(--border-light); padding-bottom: 0.5rem; }
        .prose p { margin-bottom: 1.2rem; line-height: 1.8; color: var(--text-secondary); }
        .prose ul { margin-bottom: 1.2rem; padding-left: 1.5rem; }
        .prose li { margin-bottom: 0.6rem; color: var(--text-secondary); }
        .prose code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'Cascadia Code', monospace; color: #ff8c00; }
        .prose pre { background: rgba(0,0,0,0.4); padding: 1.5rem; border-radius: 12px; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid var(--border-light); }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="mica-overlay"></div>
    
    <nav>
        <a href="/" class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M7 10L10 12L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13 14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Package Maker
        </a>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/release-notes">Notas</a>
            <a href="/faq">FAQ</a>
            <a href="https://github.com/JesusQuijada34/packagemaker" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Influent. Creado por JesusQuijada34. Suite definitiva para Influent OS.</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
