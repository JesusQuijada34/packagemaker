<!DOCTYPE html>
<html lang="{{ lang_code }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020203">
    <meta name="description" content="Package Maker - El IDE definitivo para desarrolladores Influent OS">
    <title>{% block title %}{% endblock %} - Package Maker</title>
    <link rel="icon" type="image/x-icon" href="/app/app-icon.ico">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* Design Tokens - Modern Cinema Dark */
        :root {
            /* Colors - WCAG AA compliant */
            --bg-deep: #020203;
            --bg-base: #050506;
            --bg-elevated: #0a0a0c;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --accent: #ff7a1a;
            --accent-hover: #ff8f3f;
            --accent-glow: rgba(255, 122, 26, 0.25);
            --accent-soft: rgba(255, 122, 26, 0.15);
            --foreground: #EDEDEF;
            --foreground-muted: #8A8F98;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-display: 'Space Grotesk', var(--font-sans);
            
            /* Spacing - 8pt grid */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            
            /* Radii */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px var(--accent-glow);
            
            /* Transitions */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 400ms;
        }

        /* Reset & Base */
        *, *::before, *::after { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body { 
            background: var(--bg-deep); 
            color: var(--foreground); 
            font-family: var(--font-sans); 
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Background System */
        .bg-canvas { 
            position: fixed; 
            inset: 0; 
            z-index: -2; 
            background: linear-gradient(180deg, var(--bg-base) 0%, var(--bg-deep) 100%);
            overflow: hidden;
        }
        
        .bg-grid { 
            position: absolute; 
            inset: 0; 
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px; 
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }
        
        .bg-blob { 
            position: absolute; 
            border-radius: 50%; 
            filter: blur(100px); 
            opacity: 0.06;
            will-change: transform;
        }
        
        .bg-blob-1 { 
            width: 50vw; 
            height: 50vw; 
            background: var(--accent); 
            top: -10%; 
            left: -5%;
            animation: float1 30s ease-in-out infinite alternate;
        }
        
        .bg-blob-2 { 
            width: 40vw; 
            height: 40vw; 
            background: #7C5CDD; 
            bottom: -5%; 
            right: -10%;
            animation: float2 25s ease-in-out infinite alternate;
        }
        
        .bg-blob-3 {
            width: 30vw; 
            height: 30vw; 
            background: #5CDDC9; 
            top: 40%; 
            left: 50%;
            animation: float3 35s ease-in-out infinite alternate;
        }
        
        @keyframes float1 { 
            from { transform: translate(0, 0) scale(1); } 
            to { transform: translate(5%, 10%) scale(1.1); } 
        }
        @keyframes float2 { 
            from { transform: translate(0, 0) scale(1); } 
            to { transform: translate(-8%, -5%) scale(1.15); } 
        }
        @keyframes float3 { 
            from { transform: translate(-50%, 0) scale(1); } 
            to { transform: translate(-50%, -10%) scale(1.05); } 
        }

        /* Glass Effect Layer */
        .glass-layer { 
            position: fixed; 
            inset: 0; 
            backdrop-filter: blur(1px);
            background: rgba(2, 2, 3, 0.3); 
            z-index: -1; 
            pointer-events: none;
        }

        /* Navigation - Modern Sticky */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: var(--space-4) var(--space-8);
            background: rgba(5, 5, 6, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 1000;
            transition: background var(--duration-normal) var(--ease-out);
        }
        
        nav:hover {
            background: rgba(5, 5, 6, 0.85);
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: var(--space-3); 
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none; 
            color: var(--foreground);
            transition: opacity var(--duration-fast) var(--ease-out);
        }
        
        .logo:hover { opacity: 0.8; }
        .logo img { 
            width: 32px; 
            height: 32px; 
            filter: drop-shadow(0 0 10px var(--accent-glow));
            transition: filter var(--duration-normal) var(--ease-out);
        }
        .logo:hover img { filter: drop-shadow(0 0 15px var(--accent-glow)); }

        .nav-links { 
            display: flex; 
            gap: var(--space-1);
            align-items: center;
        }
        
        .nav-links a { 
            text-decoration: none; 
            color: var(--foreground-muted); 
            font-weight: 500; 
            font-size: 0.875rem;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            transition: all var(--duration-fast) var(--ease-out);
            position: relative;
        }
        
        .nav-links a:hover { 
            color: var(--foreground);
            background: var(--surface);
        }
        
        .nav-links a.active { 
            color: var(--foreground);
            background: var(--surface);
        }
        
        .nav-links a.active::after { 
            content: ''; 
            position: absolute; 
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--accent);
            border-radius: var(--radius-full);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-6);
        }

        /* Bento Grid System */
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: var(--space-5); 
            margin-top: var(--space-10);
        }
        
        .bento-item { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius-xl); 
            padding: var(--space-6);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            transition: all var(--duration-slow) var(--ease-out);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 20px 50px rgba(0,0,0,0.28);
        }
        
        .bento-item::before { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .bento-item:hover { 
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-lg);
            background: var(--surface-hover);
        }

        /* Typography */
        h1 { 
            font-family: var(--font-display); 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            line-height: 1.1; 
            margin-bottom: var(--space-6);
            letter-spacing: -0.02em;
        }
        
        h2 { 
            font-family: var(--font-display); 
            font-size: clamp(1.5rem, 3vw, 2rem); 
            margin-bottom: var(--space-4);
            letter-spacing: -0.01em;
        }
        
        h3 {
            font-size: 1.125rem;
            margin-bottom: var(--space-2);
        }
        
        p { 
            color: var(--foreground-muted); 
            font-size: 1rem; 
            line-height: 1.7;
        }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--foreground) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Buttons */
        .btn { 
            padding: var(--space-3) var(--space-6); 
            border-radius: var(--radius-md); 
            font-weight: 600; 
            font-size: 0.9375rem;
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: var(--space-2); 
            text-decoration: none;
            transition: all var(--duration-normal) var(--ease-out); 
            cursor: pointer; 
            border: none;
            min-height: 44px;
            min-width: 44px;
        }
        
        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        
        .btn-primary { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        
        .btn-primary:hover { 
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary { 
            background: var(--surface);
            color: var(--foreground);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }

        /* Footer */
        footer {
            margin-top: var(--space-16);
            padding: var(--space-8) var(--space-6);
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--foreground-muted);
            font-size: 0.875rem;
        }

        .footer-controls {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            margin-top: var(--space-3);
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .footer-controls label {
            font-size: 0.8rem;
            color: var(--foreground-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .footer-controls select {
            background: transparent;
            color: var(--foreground);
            border: none;
            font-size: 0.875rem;
            outline: none;
            cursor: pointer;
        }
        
        /* Glass Card (for page.html) */
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Prose Content */
        .prose {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .prose h1 { margin-bottom: var(--space-8); }
        
        .prose .content {
            line-height: 1.8;
        }
        
        .prose .content h2 {
            margin-top: var(--space-10);
            padding-top: var(--space-6);
            border-top: 1px solid var(--border);
        }
        
        .prose .content p { margin-bottom: var(--space-4); }
        
        .prose .content a {
            color: var(--accent);
            text-decoration: none;
            transition: color var(--duration-fast) var(--ease-out);
        }
        
        .prose .content a:hover { color: var(--accent-hover); text-decoration: underline; }
        
        .prose .content code {
            background: var(--surface);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            font-size: 0.875em;
            color: var(--accent);
        }
        
        .prose .content pre {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            overflow-x: auto;
            margin: var(--space-4) 0;
        }
        
        .prose .content pre code {
            background: none;
            padding: 0;
            color: var(--foreground);
        }
        
        .prose .content ul, .prose .content ol {
            margin: var(--space-4) 0;
            padding-left: var(--space-6);
            color: var(--foreground-muted);
        }
        
        .prose .content li { margin-bottom: var(--space-2); }
        
        .prose .content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: var(--space-4);
            margin: var(--space-4) 0;
            color: var(--foreground-muted);
            font-style: italic;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav { 
                padding: var(--space-3) var(--space-4);
            }
            
            .nav-links { display: none; }
            
            .bento-grid { 
                grid-template-columns: 1fr; 
                gap: var(--space-4);
            }
            
            h1 { font-size: 2rem; }
            
            .container { padding: var(--space-6) var(--space-4); }
        }

        /* Accessibility */
        @media (prefers-contrast: high) {
            :root {
                --border: rgba(255, 255, 255, 0.3);
                --surface: rgba(255, 255, 255, 0.1);
                --foreground-muted: #B0B0B0;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="bg-grid"></div>
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
    </div>
    <div class="glass-layer"></div>

    <nav aria-label="Navegación principal">
        <a href="/" class="logo" aria-label="Package Maker - Inicio">
            <img src="/assets/product_logo.png" alt="" aria-hidden="true">
            <span>Package Maker</span>
        </a>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">{{ translations.nav_home }}</a>
            <a href="/download" class="{% if request.path == '/download' %}active{% endif %}">{{ translations.nav_download }}</a>
            <a href="/release-notes" class="{% if request.path == '/release-notes' %}active{% endif %}">{{ translations.nav_release_notes }}</a>
            <a href="/issues" class="{% if request.path == '/issues' %}active{% endif %}">{{ translations.nav_issues }}</a>
            <a href="/faq" class="{% if request.path == '/faq' %}active{% endif %}">{{ translations.nav_faq }}</a>
            <a href="/report" class="{% if request.path == '/report' %}active{% endif %}">Reportar</a>
        </div>
        <div class="nav-controls" style="margin-left: auto; display:flex; align-items:center; gap:0.75rem;">
            <form class="language-form" method="get" action="{{ request.path }}" style="display:flex; align-items:center; gap:0.5rem;">
                <label for="language-selector" style="color:var(--foreground-muted); font-size:0.875rem;">{{ translations.footer_language }}</label>
                <select id="language-selector" name="lang" onchange="this.form.submit()" style="background:transparent; color:var(--foreground); border:1px solid var(--border); padding:0.35rem 0.5rem; border-radius:8px;">
                    {% for code, metadata in available_languages.items() %}
                    <option value="{{ code }}" {% if code == lang_code %}selected{% endif %}>{{ metadata.native }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>
    </nav>

    <main class="container" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>{{ translations.footer_text }}</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ 
            duration: 600, 
            once: true, 
            easing: 'ease-out-cubic',
            disable: window.matchMedia('(prefers-reduced-motion: reduce)').matches
        });
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        const preferredLang = '{{ lang_code }}';
        const queryLang = new URLSearchParams(window.location.search).get('lang');
        const storedLang = queryLang || localStorage.getItem('pm-lang') || preferredLang;
        const effectiveLang = storedLang || preferredLang;
        localStorage.setItem('pm-lang', effectiveLang);
        document.cookie = `lang=${effectiveLang}; path=/; max-age=31536000; SameSite=Lax`;

        const syncLanguageInUrl = (lang) => {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            const nextUrl = `${url.pathname}${url.search}${url.hash}`;
            if (window.location.pathname + window.location.search + window.location.hash !== nextUrl) {
                window.history.replaceState({}, '', nextUrl);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            syncLanguageInUrl(effectiveLang);

            document.querySelectorAll('a[href]').forEach((anchor) => {
                try {
                    const url = new URL(anchor.href, window.location.origin);
                    if (url.origin === window.location.origin && !url.pathname.startsWith('/api/') && !url.pathname.startsWith('/static/')) {
                        if (!url.searchParams.has('lang')) {
                            url.searchParams.set('lang', effectiveLang);
                            anchor.href = `${url.pathname}${url.search}${url.hash}`;
                        }
                    }
                } catch (error) {
                    console.warn('Unable to update link language param', error);
                }
            });

            document.querySelectorAll('form').forEach((form) => {
                if (!form.querySelector('input[name="lang"], select[name="lang"]') && form.method.toLowerCase() === 'get') {
                    const langInput = document.createElement('input');
                    langInput.type = 'hidden';
                    langInput.name = 'lang';
                    langInput.value = effectiveLang;
                    form.appendChild(langInput);
                }
            });

            const languageSelector = document.getElementById('language-selector');
            if (languageSelector) {
                languageSelector.addEventListener('change', (event) => {
                    const selectedLang = event.target.value;
                    localStorage.setItem('pm-lang', selectedLang);
                    document.cookie = `lang=${selectedLang}; path=/; max-age=31536000; SameSite=Lax`;
                    syncLanguageInUrl(selectedLang);
                });
            }
        });

        window.addEventListener('popstate', () => {
            const currentLang = new URLSearchParams(window.location.search).get('lang') || localStorage.getItem('pm-lang') || preferredLang;
            syncLanguageInUrl(currentLang);
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
