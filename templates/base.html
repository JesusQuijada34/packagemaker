<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}{% endblock %} - Package Maker</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/JesusQuijada34/packagemaker/main/app/app-icon.ico">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --mica-bg: rgba(8, 8, 12, 0.9);
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --border-light: rgba(255, 255, 255, 0.08);
            --liquid-glass: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #010103; color: var(--text-primary); min-height: 100vh; overflow-x: hidden; line-height: 1.5; font-size: 15px; }

        .glass-engine { position: fixed; inset: 0; z-index: -2; background: #010103; overflow: hidden; }
        .glass-blob { position: absolute; width: 50vw; height: 50vw; border-radius: 50%; filter: blur(100px); opacity: 0.12; animation: move 25s infinite alternate; }
        .blob-1 { background: var(--accent); top: -10%; left: -10%; }
        .blob-2 { background: #ff0080; bottom: -10%; right: -10%; animation-delay: -7s; }
        .blob-3 { background: #7000ff; top: 40%; left: 30%; width: 35vw; height: 35vw; animation-delay: -12s; }
        @keyframes move { from { transform: translate(0, 0) scale(1); } to { transform: translate(15%, 15%) scale(1.15); } }

        .mica-layer { position: fixed; inset: 0; backdrop-filter: blur(120px) saturate(220%); background: rgba(2, 2, 5, 0.6); z-index: -1; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 5%; background: rgba(0, 0, 0, 0.5); border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(25px); }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; text-decoration: none; color: white; transition: 0.3s; }
        .logo:hover { transform: scale(1.02); color: var(--accent); }
        .logo svg { width: 24px; height: 24px; filter: drop-shadow(0 0 5px var(--accent)); }

        .nav-links { display: flex; gap: 0.8rem; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-size: 0.8rem; padding: 0.4rem 0.6rem; border-radius: 8px; transition: 0.2s; }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.06); }

        .container { max-width: 1000px; margin: 0 auto; padding: 1.2rem 5%; }
        .glass-card { background: var(--liquid-glass); backdrop-filter: blur(40px); border: 1px solid var(--border-light); border-radius: 20px; padding: 1.8rem; box-shadow: 0 15px 40px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn { padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 0.85rem; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 5px 15px var(--accent-glow); }

        footer { padding: 3rem 5% 2rem; text-align: center; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border-light); margin-top: 4rem; }

        /* Ocultar navegación inferior en web estándar */
        .bottom-nav-mobile { display: none; }

        @media (max-width: 600px) {
            body { font-size: 13px; }
            .nav-links { display: none; }
            /* Mostrar solo si es explícitamente PWA o móvil con parámetros */
            .is-pwa .bottom-nav-mobile { display: flex; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="{% if is_pwa %}is-pwa{% endif %}">
    <div class="glass-engine"><div class="glass-blob blob-1"></div><div class="glass-blob blob-2"></div><div class="glass-blob blob-3"></div></div>
    <div class="mica-layer"></div>
    
    <nav>
        <a href="/" class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 10L10 12L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Package Maker
        </a>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/download">Descargas</a>
            <a href="/release-notes">Notas</a>
            <a href="/issues">Issues</a>
            <a href="/admin/stats"><i class="fas fa-chart-line"></i></a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer><p>&copy; 2026 Influent OS. Creado por JesusQuijada34.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
