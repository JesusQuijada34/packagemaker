<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}{% endblock %} - Package Maker</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/JesusQuijada34/packagemaker/main/app/app-icon.ico">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap');

        :root {
            --bg: #020207;
            --surface: rgba(15, 23, 42, 0.6);
            --accent: #0052FF;
            --accent-glow: rgba(0, 82, 255, 0.4);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            --holographic: linear-gradient(90deg, #0052FF, #4D7CFF, #0052FF);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* UX Pro Max Background Engine */
        .design-canvas { position: fixed; inset: 0; z-index: -2; background: var(--bg); overflow: hidden; }
        .grid-overlay { position: absolute; inset: 0; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.2; }
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: float 25s infinite alternate; }
        .b1 { width: 60vw; height: 60vw; background: var(--accent); top: -20%; left: -10%; }
        .b2 { width: 50vw; height: 50vw; background: #7000ff; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { from { transform: translate(0,0) scale(1); } to { transform: translate(10%, 10%) scale(1.1); } }

        .mica-layer { position: fixed; inset: 0; backdrop-filter: blur(100px) saturate(180%); background: rgba(2, 2, 7, 0.7); z-index: -1; }

        /* Navigation */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem 8%; 
            background: rgba(2, 2, 7, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; text-decoration: none; color: white; }
        .logo img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--accent)); }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; transition: 0.3s; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: white; }
        .nav-links a.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: var(--accent); border-radius: 2px; }

        /* Bento Grid System */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-top: 40px; }
        .bento-item { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 24px; 
            backdrop-filter: blur(40px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .bento-item:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .bento-item::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent); pointer-events: none; }

        /* Typography scale */
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); line-height: 1.1; margin-bottom: 1.5rem; }
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 1rem; }
        p { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; }

        /* Buttons */
        .btn { 
            padding: 12px 28px; border-radius: 14px; font-weight: 600; font-size: 1rem;
            display: inline-flex; align-items: center; gap: 10px; text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: none;
        }
        .btn-primary { background: var(--holographic); background-size: 200% 100%; color: white; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-primary:hover { background-position: 100% 0; transform: scale(1.02); box-shadow: 0 15px 30px var(--accent-glow); }

        /* Responsive Mobile APK style */
        @media (max-width: 768px) {
            nav { padding: 1rem 5%; }
            .nav-links { display: none; }
            .bento-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="design-canvas">
        <div class="grid-overlay"></div>
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>
    <div class="mica-layer"></div>

    <nav>
        <a href="/" class="logo">
            <img src="https://raw.githubusercontent.com/JesusQuijada34/packagemaker/main/assets/product_logo.png" alt="PM">
            <span>Package Maker</span>
        </a>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Inicio</a>
            <a href="/download" class="{% if request.path == '/download' %}active{% endif %}">Descargas</a>
            <a href="/release-notes" class="{% if request.path == '/release-notes' %}active{% endif %}">Notas</a>
            <a href="/issues" class="{% if request.path == '/issues' %}active{% endif %}">Issues</a>
            <a href="/faq" class="{% if request.path == '/faq' %}active{% endif %}">FAQ</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p style="font-size: 0.9rem; opacity: 0.5;">&copy; 2026 Influent OS Engineering. Creado por JesusQuijada34.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true, easing: 'ease-out-cubic' });
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
