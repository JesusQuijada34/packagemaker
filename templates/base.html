<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ metadata.get('name', 'Package Maker') }}{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>{{ base_qss | safe }}{% block extra_styles %}{% endblock %}</style>
</head>
<body>

    <div class="app-container">
        {% block app_content %}
        <div class="main-content">
            {% include 'sidebar.html' %}
            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </div>
        {% endblock %}
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
    function showToast(m, t = 'info') {
        const c = document.getElementById('toastContainer');
        const to = document.createElement('div');
        to.className = `toast toast-${t}`;
        to.innerHTML = `<span>${m}</span>`;
        c.appendChild(to);
        setTimeout(() => { to.style.opacity = '0'; setTimeout(() => to.remove(), 300); }, 4000);
    }
    window.minimize = () => window.electronAPI && window.electronAPI.minimize();
    window.maximize = () => window.electronAPI && window.electronAPI.maximize();
    window.close = () => window.electronAPI && window.electronAPI.close();
    {% block scripts %}{% endblock %}
    </script>
</body>
</html>
