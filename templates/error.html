{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block title_bar %}Error{% endblock %}
{% block app_content %}
<div class="main-content" style="justify-content:center;">
    <div class="content-area" style="display:flex;align-items:center;justify-content:center;">
        <div style="text-align:center;padding:40px;">
            <div style="width:100px;height:100px;background:rgba(196,43,28,0.15);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c42b1c" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <h1 style="font-size:48px;font-weight:700;color:var(--text-primary);margin-bottom:8px;">{{ code }}</h1>
            <h2 style="font-size:24px;font-weight:600;color:var(--text-primary);margin-bottom:16px;">{{ error }}</h2>
            <p style="color:var(--text-secondary);margin-bottom:32px;">Something went wrong.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
