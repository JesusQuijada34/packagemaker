<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Package Maker IDE</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00a2ff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020205;
            --accent: #00a2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI Variable', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .glass-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a0a15 0%, #020205 100%); overflow: hidden; }
        .blob { position: absolute; width: 80vw; height: 80vw; border-radius: 50%; filter: blur(80px); opacity: 0.08; animation: float 20s infinite alternate; }
        .b1 { background: var(--accent); top: -20%; left: -20%; }
        .b2 { background: #ff0080; bottom: -20%; right: -20%; animation-delay: -10s; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(10%, 10%); } }

        .app-bar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .logo img { width: 24px; }

        .main-view { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; scroll-behavior: smooth; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(40px); }

        /* Bottom Nav - APK Style */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            height: calc(75px + var(--safe-bottom)); 
            background: rgba(10, 10, 15, 0.85); 
            backdrop-filter: blur(40px); 
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom);
            z-index: 1000;
        }

        .nav-indicator {
            position: absolute;
            top: 12px;
            height: 35px;
            width: 60px;
            background: rgba(0, 162, 255, 0.15);
            border-radius: 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .nav-item { 
            position: relative;
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            color: rgba(255,255,255,0.4); text-decoration: none; 
            font-size: 0.65rem; width: 20%;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent); font-weight: 700; }
        .nav-item i { font-size: 1.3rem; transition: 0.3s; }
        .nav-item.active i { transform: translateY(-2px); }

        .notification-toast { 
            position: fixed; top: 20px; left: 20px; right: 20px; 
            background: var(--accent); color: white; padding: 15px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; z-index: 2000; animation: slideDown 0.5s forwards;
        }
        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .termux-apk { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .termux-apk code { color: #a4c639; font-family: monospace; font-size: 0.75rem; word-break: break-all; }

        .btn-install { background: var(--accent); color: white; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; display: none; margin-bottom: 20px; width: 100%; }

        {% if mode == 'desktop' %}
        .bottom-nav { display: none; }
        .main-view { padding-bottom: 20px; }
        {% endif %}
    </style>
</head>
<body>
    <div class="glass-bg"><div class="blob b1"></div><div class="blob b2"></div></div>

    <div class="notification-toast" id="update-toast">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span><i class="fas fa-sync-alt"></i> Nueva versión: {{ version }}</span>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; border:none; color:white;">&times;</button>
        </div>
    </div>

    <header class="app-bar">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/JesusQuijada34/packagemaker/main/assets/product_logo.png" alt="PM">
            <span>Package Maker</span>
        </div>
        <div id="install-btn-container"></div>
    </header>

    <main class="main-view" id="main-content">
        <button id="install-pwa" class="btn-install">INSTALAR APP IDE</button>
        
        <div id="section-home">
            <div class="card">
                <h2>Estado del Sistema</h2>
                <p style="opacity: 0.6; font-size: 0.8rem; margin-top: 5px;">IDE optimizado para Influent OS</p>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <div style="flex: 1; background: rgba(0, 162, 255, 0.1); padding: 15px; border-radius: 15px; text-align: center;">
                        <div style="font-size: 1.5rem; font-weight: 800;">v3.2.7</div>
                        <div style="font-size: 0.6rem; opacity: 0.5;">VERSIÓN</div>
                    </div>
                    <div style="flex: 1; background: rgba(164, 198, 57, 0.1); padding: 15px; border-radius: 15px; text-align: center;">
                        <div style="font-size: 1.5rem; font-weight: 800;">Activo</div>
                        <div style="font-size: 0.6rem; opacity: 0.5;">ESTADO</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3><i class="fab fa-android"></i> Termux Installer</h3>
                <div class="termux-apk">
                    <code id="pwa-cmd">curl -sL {{ request.host_url }}api/download.sh | bash</code>
                    <button onclick="copyToClipboard(document.getElementById('pwa-cmd').innerText, this)" style="background: none; border: none; color: #a4c639; font-size: 1.1rem;"><i class="fas fa-copy"></i></button>
                </div>
            </div>
        </div>

        <div id="section-content" style="display:none;">
            <!-- Contenido dinámico -->
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-indicator" id="indicator"></div>
        <a href="javascript:void(0)" class="nav-item active" onclick="navigate('home', 0)"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="/download" class="nav-item"><i class="fas fa-download"></i><span>Descargas</span></a>
        <a href="/release-notes" class="nav-item"><i class="fas fa-history"></i><span>Notas</span></a>
        <a href="/issues" class="nav-item"><i class="fas fa-exclamation-circle"></i><span>Issues</span></a>
        <a href="/faq" class="nav-item"><i class="fas fa-question-circle"></i><span>FAQ</span></a>
    </nav>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('install-pwa');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        function navigate(section, index) {
            const items = document.querySelectorAll('.nav-item');
            const indicator = document.getElementById('indicator');
            
            items.forEach(i => i.classList.remove('active'));
            items[index].classList.add('active');
            
            // Mover el indicador
            const itemWidth = 100 / items.length;
            indicator.style.left = `calc(${index * itemWidth}% + ${(itemWidth - 15) / 2}%)`;
            
            if(section === 'home') {
                document.getElementById('section-home').style.display = 'block';
                document.getElementById('section-content').style.display = 'none';
            } else {
                // Aquí podrías cargar contenido vía AJAX si quisieras una SPA pura
                window.location.href = items[index].getAttribute('href');
            }
        }

        // Inicializar indicador
        window.onload = () => {
            const path = window.location.pathname;
            const items = document.querySelectorAll('.nav-item');
            let activeIndex = 0;
            
            if(path.includes('download')) activeIndex = 1;
            else if(path.includes('release-notes')) activeIndex = 2;
            else if(path.includes('issues')) activeIndex = 3;
            else if(path.includes('faq')) activeIndex = 4;
            
            navigate('init', activeIndex);
        };

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => btn.innerHTML = icon, 2000);
            });
        }
    </script>
</body>
</html>
