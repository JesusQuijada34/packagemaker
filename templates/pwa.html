<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020203">
    <title>Package Maker IDE</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #020203;
            --bg-base: #050506;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --accent: #5E6AD2;
            --accent-soft: rgba(94, 106, 210, 0.15);
            --accent-glow: rgba(94, 106, 210, 0.25);
            --foreground: #EDEDEF;
            --foreground-muted: #8A8F98;
            --border: rgba(255, 255, 255, 0.08);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-deep); 
            color: var(--foreground); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .bg-gradient { 
            position: fixed; 
            inset: 0; 
            z-index: -1; 
            background: linear-gradient(180deg, var(--bg-base) 0%, var(--bg-deep) 100%);
        }

        /* App Bar */
        .app-bar { 
            height: 56px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 var(--space-4);
            background: rgba(5, 5, 6, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .logo { 
            display: flex; 
            align-items: center; 
            gap: var(--space-3); 
            font-weight: 700;
            font-size: 1rem;
        }
        .logo img { width: 28px; }

        /* Main Content */
        .main-view { 
            flex: 1; 
            overflow-y: auto; 
            padding: var(--space-4);
            padding-bottom: calc(80px + var(--safe-bottom));
            scroll-behavior: smooth;
        }
        
        .card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-xl); 
            padding: var(--space-5); 
            margin-bottom: var(--space-4);
            transition: all 0.25s;
        }
        .card:active { background: var(--surface-hover); }

        /* Status Card */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-top: var(--space-4); }
        .status-item { 
            background: var(--surface); 
            padding: var(--space-4); 
            border-radius: var(--radius-lg); 
            text-align: center;
            border: 1px solid var(--border);
        }
        .status-value { font-size: 1.5rem; font-weight: 800; margin-bottom: var(--space-1); }
        .status-label { font-size: 0.625rem; color: var(--foreground-muted); text-transform: uppercase; letter-spacing: 1px; }
        .status-positive { color: #6bff6b; }
        .status-accent { color: var(--accent); }

        /* Termux Card */
        .termux-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: var(--space-4); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: var(--space-3);
        }
        .termux-card code { 
            color: #A4C639; 
            font-family: 'SF Mono', Monaco, monospace; 
            font-size: 0.75rem;
            word-break: break-all;
            flex: 1;
        }
        .copy-btn {
            background: rgba(164, 198, 57, 0.15);
            border: none;
            color: #A4C639;
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .copy-btn:active { transform: scale(0.95); }

        /* Install Button */
        .btn-install { 
            background: var(--accent); 
            color: white; 
            padding: var(--space-4); 
            border-radius: var(--radius-lg); 
            border: none; 
            font-weight: 700;
            font-size: 0.9375rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.25s;
            display: none;
        }
        .btn-install:active { transform: scale(0.98); }

        /* Bottom Navigation */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: calc(64px + var(--safe-bottom)); 
            background: rgba(5, 5, 6, 0.9);
            backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid var(--border);
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding-bottom: var(--safe-bottom);
            z-index: 1000;
        }

        .nav-indicator {
            position: absolute;
            top: 8px;
            height: 40px;
            width: 60px;
            background: var(--accent-soft);
            border-radius: var(--radius-lg);
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .nav-item { 
            position: relative;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px; 
            color: var(--foreground-muted); 
            text-decoration: none; 
            font-size: 0.625rem;
            width: 20%;
            padding: var(--space-2) 0;
            transition: color 0.2s;
            min-height: 44px;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item.active { color: var(--accent); font-weight: 600; }

        /* Toast */
        .toast { 
            position: fixed; 
            top: 70px; 
            left: var(--space-4); 
            right: var(--space-4); 
            background: var(--accent); 
            color: white; 
            padding: var(--space-4); 
            border-radius: var(--radius-lg);
            display: none;
            z-index: 2000;
            animation: slideDown 0.4s var(--ease-out);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .toast-content { display: flex; justify-content: space-between; align-items: center; }
        .toast-close { background: none; border: none; color: white; cursor: pointer; padding: var(--space-2); }

        @keyframes slideDown { 
            from { transform: translateY(-100px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        {% if mode == 'desktop' %}
        .bottom-nav { display: none; }
        .main-view { padding-bottom: var(--space-4); }
        {% endif %}
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Toast Notification -->
    <div class="toast" id="update-toast">
        <div class="toast-content">
            <span><i class="fas fa-sync-alt"></i> Nueva versión: {{ version }}</span>
            <button class="toast-close" onclick="this.parentElement.parentElement.style.display='none'">&times;</button>
        </div>
    </div>

    <header class="app-bar">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/JesusQuijada34/packagemaker/main/assets/product_logo.png" alt="PM">
            <span>Package Maker</span>
        </div>
        <div id="install-container"></div>
    </header>

    <main class="main-view">
        <button id="install-pwa" class="btn-install">INSTALAR APP IDE</button>
        
        <div id="section-home">
            <div class="card">
                <h2 style="font-size: 1.125rem; margin-bottom: var(--space-1);">Estado del Sistema</h2>
                <p style="font-size: 0.8125rem; color: var(--foreground-muted);">IDE optimizado para Influent OS</p>
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-value status-accent">v3.2.7</div>
                        <div class="status-label">Versión</div>
                    </div>
                    <div class="status-item">
                        <div class="status-value status-positive">●</div>
                        <div class="status-label">Estado</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="font-size: 1rem; margin-bottom: var(--space-3);">
                    <i class="fab fa-android" style="color: #A4C639; margin-right: var(--space-2);"></i> Termux Installer
                </h3>
                <div class="termux-card">
                    <code id="pwa-cmd">curl -sL {{ request.host_url }}api/download.sh | bash</code>
                    <button class="copy-btn" onclick="copyToClipboard()" aria-label="Copiar comando">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-indicator" id="indicator"></div>
        <a href="javascript:void(0)" class="nav-item active" onclick="navigate(0)">
            <i class="fas fa-home"></i>
            <span>Inicio</span>
        </a>
        <a href="/download" class="nav-item" onclick="navigate(1)">
            <i class="fas fa-download"></i>
            <span>Descargas</span>
        </a>
        <a href="/release-notes" class="nav-item" onclick="navigate(2)">
            <i class="fas fa-history"></i>
            <span>Notas</span>
        </a>
        <a href="/issues" class="nav-item" onclick="navigate(3)">
            <i class="fas fa-exclamation-circle"></i>
            <span>Issues</span>
        </a>
        <a href="/faq" class="nav-item" onclick="navigate(4)">
            <i class="fas fa-question-circle"></i>
            <span>FAQ</span>
        </a>
    </nav>

    <script>
        // PWA Install
        let deferredPrompt;
        const installBtn = document.getElementById('install-pwa');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // Navigation
        function navigate(index) {
            const items = document.querySelectorAll('.nav-item');
            const indicator = document.getElementById('indicator');
            
            items.forEach(i => i.classList.remove('active'));
            items[index].classList.add('active');
            
            const itemWidth = 100 / items.length;
            indicator.style.left = `calc(${index * itemWidth}% + ${(itemWidth - 15) / 2}%)`;
        }

        // Init navigation
        window.onload = () => {
            const path = window.location.pathname;
            let activeIndex = 0;
            
            if(path.includes('download')) activeIndex = 1;
            else if(path.includes('release-notes')) activeIndex = 2;
            else if(path.includes('issues')) activeIndex = 3;
            else if(path.includes('faq')) activeIndex = 4;
            
            navigate(activeIndex);
        };

        // Copy to clipboard
        function copyToClipboard() {
            const code = document.getElementById('pwa-cmd');
            navigator.clipboard.writeText(code.innerText).then(() => {
                const btn = document.querySelector('.copy-btn i');
                btn.className = 'fas fa-check';
                setTimeout(() => btn.className = 'fas fa-copy', 2000);
            });
        }
    </script>
</body>
</html>
