{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block title_bar %}Login{% endblock %}
{% block app_content %}
<div class="main-content" style="justify-content:center;">
    <div class="content-area" style="display:flex;align-items:center;justify-content:center;">
        <div style="width:100%;max-width:400px;padding:40px;">
            <div style="text-align:center;margin-bottom:32px;">
                <div style="width:80px;height:80px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <h1 style="font-size:24px;font-weight:600;color:var(--text-primary);margin-bottom:8px;">Welcome</h1>
                <p style="color:var(--text-secondary);">Sign in to Package Maker</p>
            </div>
            <div class="card">
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                        Sign In
                    </button>
                </form>
            </div>
            <div style="text-align:center;margin-top:24px;">
                <a href="{{ url_for('index') }}" style="color:var(--text-secondary);font-size:13px;text-decoration:none;">← Back to home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
{{ super() }}
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const res = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
    const d = await res.json();
    if (d.success) { showToast('Welcome!', 'success'); window.location.href = '/'; }
    else showToast(d.error || 'Login failed', 'error');
});
</script>
{% endblock %}
